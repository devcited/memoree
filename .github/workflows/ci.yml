name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt,clippy --no-self-update
      - name: Select Rust toolchain
        run: rustup override set "$RUST_VERSION"
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        run: cargo test --locked
      - name: Retrieval regression suite
        run: cargo run --locked --bin memoree-eval -- eval/corpus/v2
      - name: Verify generated web contracts
        if: runner.os == 'Linux'
        run: |
          sh scripts/export-web-contracts.sh
          git diff --exit-code -- site/public/schema/v1.json site/public/agents/instructions.md
  dependencies:
    name: Dependency policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check

  secrets:
    name: Secret history
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.30.1"

  site:
    name: Site
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Validate installer syntax
        run: sh -n public/install.sh

  release-plan:
    name: Release plan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh
      - run: dist generate --check
      - run: dist plan --output-format=json > /dev/null
