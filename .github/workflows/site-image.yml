name: Site image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

concurrency:
  group: site-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Validate tag version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          manifest_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          test "$version" = "$manifest_version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: harbor.devcited.cc
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: site/Dockerfile
          push: true
          tags: |
            harbor.devcited.cc/memoree/site:${{ steps.version.outputs.version }}
            harbor.devcited.cc/memoree/site:latest
          provenance: mode=max
          sbom: true
