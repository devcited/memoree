server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml application/xml;

    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /install.sh {
        default_type text/plain;
        expires -1;
        try_files $uri =404;
    }

    location = /releases/latest.json {
        default_type application/json;
        expires -1;
        try_files $uri =404;
    }

    location = /releases/latest.txt {
        default_type text/plain;
        expires -1;
        try_files $uri =404;
    }

    location ~ ^/releases/download/(v[0-9A-Za-z.-]+)/([0-9A-Za-z._-]+)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        return 302 https://github.com/devcited/memoree/releases/download/$1/$2;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
